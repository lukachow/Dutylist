<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能排更系統 - 醫護/辦公室版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --d2-bg: #e3f2fd; --d2-text: #0d47a1;
            --d7-bg: #f3e5f5; --d7-text: #4a148c;
            --call-bg: #fff3e0; --call-text: #e65100;
            --holiday-bg: #ffebee;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 20px; color: var(--primary); }
        h2 { text-align: center; color: var(--primary); }
        
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; background: #f9f9f9; padding: 15px; border-radius: 8px; }
        
        button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn-generate { background: #27ae60; color: white; }
        .btn-reset { background: #e74c3c; color: white; }
        .btn-export { background: #f39c12; color: white; }
        button:hover { opacity: 0.8; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background: var(--primary); color: white; position: sticky; top: 0; }

        /* Duty Colors */
        .duty-D2 { background: var(--d2-bg); color: var(--d2-text); font-weight: bold; }
        .duty-D7 { background: var(--d7-bg); color: var(--d7-text); font-weight: bold; }
        .duty-C, .duty-C1, .duty-C2 { background: var(--call-bg); color: var(--call-text); border: 1px solid var(--call-text); font-weight: bold; }
        .is-holiday { background: var(--holiday-bg); color: #c62828; }
        .off-duty { background: #eee; color: #999; }

        .cell-input { width: 100%; height: 100%; border: none; background: transparent; text-align: center; cursor: pointer; }
        .cell-input:focus { outline: 2px solid var(--accent); }

        .legend { display: flex; gap: 15px; justify-content: center; margin-top: 10px; font-size: 12px; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .box { width: 15px; height: 15px; border-radius: 3px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🗓️ 自動化排更系統</h2>

    <div class="controls">
        <div>
            <label>年份：</label>
            <input type="number" id="year" value="2024" style="width: 70px;">
            <label>月份：</label>
            <input type="number" id="month" value="10" min="1" max="12" style="width: 50px;">
            <button onclick="initTable()">設定月份</button>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-generate" onclick="generateSchedule()">⚡ 自動生成更表</button>
            <button class="btn-reset" onclick="clearNoCall()">🧹 清除 No Call</button>
            <button class="btn-export" onclick="exportToExcel()">📥 匯出 Excel</button>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="box duty-D2"></div> D2: 08:30-17:18</div>
        <div class="legend-item"><div class="box duty-D7"></div> D7: 09:30-18:18</div>
        <div class="legend-item"><div class="box duty-C"></div> C/C1/C2: Call Duty</div>
        <div class="legend-item"><div class="box" style="background:#eee"></div> OFF: 放假/不排班</div>
    </div>

    <div style="overflow-x: auto;">
        <table id="scheduleTable">
            <thead><tr id="headerRow"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div style="margin-top: 20px; font-size: 12px; color: #666;">
        <strong>操作說明：</strong><br>
        1. 輸入 <b>"OFF"</b> 代表放假 (不計入平均)。<br>
        2. 輸入 <b>"NC"</b> 代表 No Call (不編 Call，但會編 D2/D7)。<br>
        3. 直接輸入 <b>"C", "C1", "C2"</b> 可預設特定日子返 Call。
    </div>
</div>

<script>
    // 預設員工名單
    const staffList = ["員工 A", "員工 B", "員工 C", "員工 D", "員工 E", "員工 F", "員工 G", "員工 H", "員工 I", "員工 J"];
    
    // 簡單的香港公眾假期 (範例，實際建議串接 API 或手動輸入)
    const holidays2024 = ["2024-01-01", "2024-02-10", "2024-02-12", "2024-02-13", "2024-03-29", "2024-03-30", "2024-04-01", "2024-04-04", "2024-05-01", "2024-05-15", "2024-06-10", "2024-07-01", "2024-09-19", "2024-10-01", "2024-10-11", "2024-12-25", "2024-12-26"];

    function isHoliday(dateStr) {
        const d = new Date(dateStr);
        const day = d.getDay();
        return day === 0 || day === 6 || holidays2024.includes(dateStr);
    }

    function initTable() {
        const year = document.getElementById('year').value;
        const month = document.getElementById('month').value;
        const daysInMonth = new Date(year, month, 0).getDate();
        
        const headerRow = document.getElementById('headerRow');
        const tableBody = document.getElementById('tableBody');
        
        headerRow.innerHTML = '<th>員工 \ 日期</th>';
        for(let i=1; i<=daysInMonth; i++) {
            const date = `${year}-${String(month).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const dayName = ["日","一","二","三","四","五","六"][new Date(date).getDay()];
            const holidayClass = isHoliday(date) ? 'class="is-holiday"' : '';
            headerRow.innerHTML += `<th ${holidayClass}>${i}<br>(${dayName})</th>`;
        }

        tableBody.innerHTML = '';
        staffList.forEach(staff => {
            let row = `<tr><td><b>${staff}</b></td>`;
            for(let i=1; i<=daysInMonth; i++) {
                row += `<td><input type="text" class="cell-input" data-staff="${staff}" data-day="${i}"></td>`;
            }
            row += '</tr>';
            tableBody.appendChild(row);
        });
    }

    function clearNoCall() {
        document.querySelectorAll('.cell-input').forEach(input => {
            if(input.value.toUpperCase() === 'NC') input.value = '';
        });
    }

    function generateSchedule() {
        const year = document.getElementById('year').value;
        const month = document.getElementById('month').value;
        const daysInMonth = new Date(year, month, 0).getDate();
        
        const schedule = {}; 
        const stats = {}; // 追蹤次數: { staff: { callTotal: 0, d7Total: 0, tueThuC: 0, lastCallDay: -10 } }

        staffList.forEach(s => {
            stats[s] = { callTotal: 0, d7Total: 0, tueThuC: 0, lastCallDay: -10, weekendCallCount: 0 };
        });

        // 讀取預設值 (OFF, NC, 指定 Call)
        for(let d=1; d<=daysInMonth; d++) {
            schedule[d] = {};
            staffList.forEach(s => {
                const val = document.querySelector(`input[data-staff="${s}"][data-day="${d}"]`).value.toUpperCase();
                if(val) {
                    schedule[d][s] = val;
                    if(['C','C1','C2'].includes(val)) {
                        stats[s].callTotal++;
                        stats[s].lastCallDay = d;
                        const dateObj = new Date(year, month-1, d);
                        if(dateObj.getDay() === 2 || dateObj.getDay() === 4) stats[s].tueThuC++;
                        if(isHoliday(`${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`)) stats[s].weekendCallCount++;
                    }
                }
            });
        }

        // 開始排程邏輯
        for(let d=1; d<=daysInMonth; d++) {
            const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dateObj = new Date(dateStr);
            const isWE = isHoliday(dateStr);
            const dayOfWeek = dateObj.getDay();

            let availableStaff = staffList.filter(s => schedule[d][s] !== 'OFF' && schedule[d][s] !== 'NC' && !['C','C1','C2'].includes(schedule[d][s]));
            
            // 排序員工以平衡 Call 次數 (優先排 Call 數少的人)
            availableStaff.sort((a, b) => {
                if(dayOfWeek === 2 || dayOfWeek === 4) {
                    return stats[a].tueThuC - stats[b].tueThuC || stats[a].callTotal - stats[b].callTotal;
                }
                return stats[a].callTotal - stats[b].callTotal;
            });

            // 1. 分配 Call Duty
            if(isWE) {
                // 需要 C1, C2
                ['C1', 'C2'].forEach(dutyType => {
                    if (Object.values(schedule[d]).includes(dutyType)) return; // 已預設則跳過
                    const candidate = availableStaff.find(s => 
                        d - stats[s].lastCallDay >= 3 && 
                        stats[s].weekendCallCount < 2 &&
                        (d - stats[s].lastCallDay <= 7 || stats[s].callTotal < 5)
                    );
                    if(candidate) {
                        schedule[d][candidate] = dutyType;
                        stats[candidate].callTotal++;
                        stats[candidate].weekendCallCount++;
                        stats[candidate].lastCallDay = d;
                        availableStaff = availableStaff.filter(s => s !== candidate);
                    }
                });
            } else {
                // 平日需要一個 C
                if (!Object.values(schedule[d]).includes('C')) {
                    const candidate = availableStaff.find(s => d - stats[s].lastCallDay >= 3);
                    if(candidate) {
                        schedule[d][candidate] = 'C';
                        stats[candidate].callTotal++;
                        stats[candidate].lastCallDay = d;
                        if(dayOfWeek === 2 || dayOfWeek === 4) stats[candidate].tueThuC++;
                        availableStaff = availableStaff.filter(s => s !== candidate);
                    }
                }
            }

            // 2. 分配 D7 (平日4個，假日0個)
            let remainingStaff = staffList.filter(s => !['OFF','C','C1','C2'].includes(schedule[d][s]));
            remainingStaff.sort((a, b) => stats[a].d7Total - stats[b].d7Total);

            const d7CountNeeded = isWE ? 0 : 4;
            let d7Assigned = 0;
            remainingStaff.forEach(s => {
                if(d7Assigned < d7CountNeeded && !schedule[d][s]) {
                    schedule[d][s] = 'D7';
                    stats[s].d7Total++;
                    d7Assigned++;
                } else if (!schedule[d][s]) {
                    schedule[d][s] = 'D2';
                }
            });
        }

        // 渲染到畫面上
        staffList.forEach(s => {
            for(let d=1; d<=daysInMonth; d++) {
                const input = document.querySelector(`input[data-staff="${s}"][data-day="${d}"]`);
                const val = schedule[d][s];
                input.value = val;
                input.parentElement.className = val === 'OFF' ? 'off-duty' : `duty-${val}`;
            }
        });
    }

    function exportToExcel() {
        const table = document.getElementById("scheduleTable");
        const wb = XLSX.utils.table_to_book(table, {sheet: "更表"});
        XLSX.writeFile(wb, `Schedule_${document.getElementById('month').value}月.xlsx`);
    }

    window.onload = initTable;
</script>

</body>
</html>

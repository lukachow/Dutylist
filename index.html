<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能排更系統 - 彈性人數版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db;
            --d2-bg: #e3f2fd; --d2-text: #0d47a1;
            --d7-bg: #f3e5f5; --d7-text: #4a148c;
            --call-bg: #fff3e0; --call-text: #e65100;
            --holiday-bg: #ffebee; --off-bg: #f8f9fa; --off-text: #adb5bd;
        }
        body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background: #f0f2f5; margin: 20px; }
        .container { max-width: 95%; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        .setup-panel { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #eee; }
        .staff-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .tag { background: var(--primary); color: white; padding: 5px 12px; border-radius: 20px; display: flex; align-items: center; gap: 8px; }
        .tag span { cursor: pointer; font-weight: bold; }

        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 20px; }
        input, button { padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        button { cursor: pointer; font-weight: bold; transition: 0.2s; border: none; }
        .btn-add { background: var(--accent); color: white; }
        .btn-gen { background: #27ae60; color: white; font-size: 1.1em; }
        .btn-export { background: #f39c12; color: white; }

        .table-wrapper { overflow-x: auto; border-radius: 8px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; background: white; text-align: center; }
        th, td { border: 1px solid #eee; padding: 8px 4px; min-width: 40px; }
        th { background: #f1f3f5; font-size: 12px; position: sticky; top: 0; }
        .staff-name { width: 120px; font-weight: bold; background: #f8f9fa !important; }

        .cell-input { width: 90%; height: 30px; border: 1px solid transparent; text-align: center; font-weight: bold; border-radius: 4px; text-transform: uppercase; }
        
        /* Duty Colors */
        .duty-D2 { background-color: var(--d2-bg) !important; color: var(--d2-text); }
        .duty-D7 { background-color: var(--d7-bg) !important; color: var(--d7-text); }
        .duty-C, .duty-C1, .duty-C2 { background-color: var(--call-bg) !important; color: var(--call-text); border: 1px solid orange !important; }
        .duty-OFF { background-color: var(--off-bg) !important; color: var(--off-text); }
        .is-holiday { background-color: var(--holiday-bg) !important; color: #d32f2f; }
    </style>
</head>
<body>

<div class="container">
    <h2>🗓️ 醫護排更系統 (動態人數版)</h2>

    <div class="setup-panel">
        <div class="toolbar">
            年份: <input type="number" id="year" value="2024" style="width:80px">
            月份: <input type="number" id="month" value="10" min="1" max="12" style="width:60px">
            <input type="text" id="newStaffName" placeholder="輸入同事姓名" style="width:150px">
            <button class="btn-add" onclick="addStaff()">＋ 新增同事</button>
            <button class="btn-add" style="background:#6c757d" onclick="initTable()">1. 生成空白表</button>
        </div>
        <div class="staff-tags" id="staffTags"></div>
    </div>

    <div class="toolbar">
        <button class="btn-gen" onclick="generateSchedule()">2. 自動計算更表 (遵守假日 Rules)</button>
        <button class="btn-export" onclick="exportData()">📥 匯出 Excel</button>
    </div>

    <div class="table-wrapper">
        <table id="scheduleTable">
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

<script>
    let staffList = ["員工1", "員工2", "員工3", "員工4", "員工5", "員工6", "員工7", "員工8"];
    const hkHolidays = ["2024-01-01", "2024-02-10", "2024-02-12", "2024-02-13", "2024-03-29", "2024-03-30", "2024-04-01", "2024-04-04", "2024-05-01", "2024-05-15", "2024-06-10", "2024-07-01", "2024-09-19", "2024-10-01", "2024-10-11", "2024-12-25", "2024-12-26"];

    function isHoliday(y, m, d) {
        const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const day = new Date(y, m - 1, d).getDay();
        return day === 0 || day === 6 || hkHolidays.includes(dateStr);
    }

    function addStaff() {
        const name = document.getElementById('newStaffName').value.trim();
        if(name && !staffList.includes(name)) {
            staffList.push(name);
            document.getElementById('newStaffName').value = '';
            renderTags();
        }
    }

    function removeStaff(name) {
        staffList = staffList.filter(s => s !== name);
        renderTags();
    }

    function renderTags() {
        const container = document.getElementById('staffTags');
        container.innerHTML = staffList.map(s => `<div class="tag">${s} <span onclick="removeStaff('${s}')">×</span></div>`).join('');
    }

    function initTable() {
        const y = document.getElementById('year').value;
        const m = document.getElementById('month').value;
        const days = new Date(y, m, 0).getDate();
        
        let header = `<tr><th class="staff-name">同事</th>`;
        for(let d=1; d<=days; d++) {
            const hClass = isHoliday(y, m, d) ? 'is-holiday' : '';
            const dayName = ["日","一","二","三","四","五","六"][new Date(y, m-1, d).getDay()];
            header += `<th class="${hClass}">${d}<br>${dayName}</th>`;
        }
        header += `</tr>`;
        document.getElementById('thead').innerHTML = header;

        let body = '';
        staffList.forEach(name => {
            body += `<tr><td class="staff-name">${name}</td>`;
            for(let d=1; d<=days; d++) {
                body += `<td><input type="text" class="cell-input" data-staff="${name}" data-day="${d}" oninput="applyStyle(this)"></td>`;
            }
            body += `</tr>`;
        });
        document.getElementById('tbody').innerHTML = body;
    }

    function applyStyle(el) {
        el.className = 'cell-input';
        const val = el.value.toUpperCase();
        if (['D2','D7','C','C1','C2','OFF','NC'].includes(val)) el.classList.add('duty-' + val);
    }

    function generateSchedule() {
        const y = parseInt(document.getElementById('year').value);
        const m = parseInt(document.getElementById('month').value);
        const days = new Date(y, m, 0).getDate();
        const schedule = {};
        const stats = {};
        staffList.forEach(s => stats[s] = { totalCall: 0, d7: 0, t24: 0, lastCall: -10, weCall: 0 });

        // 讀取預填
        for(let d=1; d<=days; d++) {
            schedule[d] = {};
            staffList.forEach(s => {
                const val = document.querySelector(`[data-staff="${s}"][data-day="${d}"]`).value.toUpperCase();
                if(val) {
                    schedule[d][s] = val;
                    if(['C','C1','C2'].includes(val)) {
                        stats[s].totalCall++; stats[s].lastCall = d;
                        if(isHoliday(y,m,d)) stats[s].weCall++;
                    }
                }
            });
        }

        // 自動排更核心
        for(let d=1; d<=days; d++) {
            const isWE = isHoliday(y, m, d);
            const dw = new Date(y, m-1, d).getDay();

            // 1. 分配 Call (平日1個C, 假日1個C1+1個C2)
            let callsNeeded = isWE ? ['C1', 'C2'] : ['C'];
            callsNeeded.forEach(type => {
                if (Object.values(schedule[d]).includes(type)) return;
                
                let candidates = staffList.filter(s => !schedule[d][s] && (d - stats[s].lastCall >= 3));
                if (candidates.length === 0) candidates = staffList.filter(s => !schedule[d][s]);

                candidates.sort((a,b) => (stats[a].totalCall - stats[b].totalCall) || (stats[a].t24 - stats[b].t24) || (Math.random()-0.5));
                
                if(candidates.length > 0) {
                    const picked = candidates[0];
                    schedule[d][picked] = type;
                    stats[picked].totalCall++;
                    stats[picked].lastCall = d;
                    if(isWE) stats[picked].weCall++;
                    if(dw===2 || dw===4) stats[picked].t24++;
                }
            });

            // 2. 分配其餘職位 (平日 4個D7, 假日全部OFF)
            if (isWE) {
                staffList.forEach(s => {
                    if(!schedule[d][s] || schedule[d][s] === 'NC') schedule[d][s] = 'OFF';
                });
            } else {
                let d7Count = staffList.filter(s => schedule[d][s] === 'D7').length;
                let d7Pool = staffList.filter(s => !schedule[d][s] || schedule[d][s] === 'NC');
                d7Pool.sort((a,b) => (stats[a].d7 - stats[b].d7) || (Math.random()-0.5));
                
                while(d7Count < 4 && d7Pool.length > 0) {
                    const s = d7Pool.shift();
                    schedule[d][s] = 'D7';
                    stats[s].d7++;
                    d7Count++;
                }
                staffList.forEach(s => {
                    if(!schedule[d][s] || schedule[d][s] === 'NC') schedule[d][s] = 'D2';
                });
            }
        }

        // 更新 UI
        staffList.forEach(s => {
            for(let d=1; d<=days; d++) {
                const input = document.querySelector(`[data-staff="${s}"][data-day="${d}"]`);
                input.value = schedule[d][s];
                applyStyle(input);
            }
        });
    }

    function exportData() {
        const wb = XLSX.utils.table_to_book(document.getElementById("scheduleTable"));
        XLSX.writeFile(wb, `更表_${document.getElementById('year').value}_${document.getElementById('month').value}.xlsx`);
    }

    renderTags();
</script>
</body>
</html>

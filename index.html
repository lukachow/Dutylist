<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>醫護排更系統 - D7 平均分配版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db;
            --d2-bg: #e3f2fd; --d2-text: #0d47a1;
            --d7-bg: #f3e5f5; --d7-text: #4a148c;
            --call-bg: #fff3e0; --call-text: #e65100;
            --holiday-bg: #ffebee; --o-bg: #eeeeee;
        }
        body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background: #f0f2f5; margin: 15px; }
        .container { max-width: 98%; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .setup-section { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ddd; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 15px; }
        input, button, textarea { padding: 8px; border: 1px solid #ddd; border-radius: 6px; }
        button { cursor: pointer; font-weight: bold; border: none; transition: 0.2s; }
        .btn-gen { background: #27ae60; color: white; padding: 10px 20px; font-size: 1.1em; }
        .btn-export { background: #f39c12; color: white; }
        .tag { background: var(--primary); color: white; padding: 4px 10px; border-radius: 15px; display: inline-flex; align-items: center; gap: 5px; margin: 3px; }
        .table-wrapper { overflow-x: auto; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; background: white; text-align: center; table-layout: fixed; }
        th, td { border: 1px solid #eee; padding: 4px 1px; height: 35px; }
        th { background: #f1f3f5; font-size: 11px; }
        .is-holiday { background-color: var(--holiday-bg) !important; color: #d32f2f; }
        .staff-name { width: 90px; font-weight: bold; background: #f8f9fa !important; }
        .cell-input { width: 92%; height: 26px; border: 1px solid transparent; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        .duty-D2 { background-color: var(--d2-bg) !important; color: var(--d2-text); }
        .duty-D7 { background-color: var(--d7-bg) !important; color: var(--d7-text); }
        .duty-C, .duty-C1, .duty-C2 { background-color: var(--call-bg) !important; color: var(--call-text); border: 1px solid orange !important; }
        .duty-O { background-color: var(--o-bg) !important; color: #999; }
        .summary-table { width: 100%; max-width: 900px; margin-top: 20px; border: 1px solid #ddd; }
        .summary-table th { background: var(--primary); color: white; padding: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏥 醫護排更系統 (D7 公平分配版)</h2>

    <div class="setup-section">
        <div class="toolbar">
            年份: <input type="number" id="year" value="2026" style="width:80px">
            月份: <input type="number" id="month" value="3" min="1" max="12" style="width:60px">
            <input type="text" id="newStaffName" placeholder="同事姓名" style="width:120px">
            <button style="background:var(--accent); color:white" onclick="addStaff()">＋新增同事</button>
            <button style="background:#6c757d; color:white;" onclick="initTable()">1. 生成空白表</button>
        </div>
        <div id="staffTags"></div>
        <hr>
        <div class="toolbar">
            <b>假期更新：</b>
            <textarea id="holidayInput" placeholder="貼入額外假期日期 (如 2026-12-25)，每行一個" style="width:100%; height:40px; font-size:12px;"></textarea>
            <button style="background:#e17055; color:white;" onclick="syncHolidays()">同步假期</button>
        </div>
    </div>

    <div class="toolbar">
        <button class="btn-gen" onclick="generateSchedule()">2. 自動計算 (D7 與 Call 平均化)</button>
        <button class="btn-export" onclick="exportData()">📥 匯出 Excel</button>
    </div>

    <div class="table-wrapper">
        <table id="scheduleTable">
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <div class="summary-section">
        <h3>📊 每月統計 (請檢查 D7 是否接近)</h3>
        <table class="summary-table">
            <thead>
                <tr><th>同事</th><th>D2</th><th style="background:#4a148c">D7</th><th>C</th><th>C1</th><th>C2</th><th>O</th><th>總 Call</th></tr>
            </thead>
            <tbody id="summaryBody"></tbody>
        </table>
    </div>
</div>

<script>
    let holidays = ["2026-01-01","2026-02-17","2026-02-18","2026-02-19","2026-04-03","2026-04-04","2026-04-05","2026-04-06","2026-05-01","2026-05-24","2026-06-19","2026-07-01","2026-09-26","2026-10-01","2026-10-19","2026-12-25","2026-12-26"];
    let staffList = ["同事A", "同事B", "同事C", "同事D", "同事E", "同事F", "同事G", "同事H", "同事I", "同事J"];

    function isHoliday(y, m, d) {
        const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const day = new Date(y, m - 1, d).getDay();
        return day === 0 || day === 6 || holidays.includes(dateStr);
    }

    function syncHolidays() {
        const input = document.getElementById('holidayInput').value;
        if(input) {
            const newDates = input.split(/[\n,]+/).map(d => d.trim()).filter(d => d);
            holidays = [...new Set([...holidays, ...newDates])];
            alert("假期已同步！");
            initTable();
        }
    }

    function addStaff() {
        const name = document.getElementById('newStaffName').value.trim();
        if(name && !staffList.includes(name)) { staffList.push(name); renderTags(); }
    }

    function renderTags() {
        document.getElementById('staffTags').innerHTML = staffList.map(s => `<div class="tag">${s} <span onclick="staffList=staffList.filter(x=>x!=='${s}');renderTags();" style="cursor:pointer;color:#ff7675">×</span></div>`).join('');
    }

    function initTable() {
        const y = document.getElementById('year').value;
        const m = document.getElementById('month').value;
        const days = new Date(y, m, 0).getDate();
        let header = `<tr><th class="staff-name">同事</th>`;
        for(let d=1; d<=days; d++) {
            const hClass = isHoliday(y, m, d) ? 'is-holiday' : '';
            header += `<th class="${hClass}">${d}<br>${["日","一","二","三","四","五","六"][new Date(y, m-1, d).getDay()]}</th>`;
        }
        header += `</tr>`;
        document.getElementById('thead').innerHTML = header;

        let body = '';
        staffList.forEach(name => {
            body += `<tr><td class="staff-name">${name}</td>`;
            for(let d=1; d<=days; d++) body += `<td><input type="text" class="cell-input" data-staff="${name}" data-day="${d}" oninput="updateUI(this)"></td>`;
            body += `</tr>`;
        });
        document.getElementById('tbody').innerHTML = body;
        calculateSummary();
    }

    function updateUI(el) {
        applyStyle(el);
        calculateSummary();
    }

    function applyStyle(el) {
        el.className = 'cell-input';
        const val = el.value.toUpperCase();
        if (['D2','D7','C','C1','C2','O'].includes(val)) el.classList.add('duty-' + val);
    }

    function calculateSummary() {
        const summaryBody = document.getElementById('summaryBody');
        summaryBody.innerHTML = '';
        staffList.forEach(name => {
            const inputs = document.querySelectorAll(`input[data-staff="${name}"]`);
            let counts = { D2:0, D7:0, C:0, C1:0, C2:0, O:0 };
            inputs.forEach(input => {
                const val = input.value.toUpperCase();
                if (counts[val] !== undefined) counts[val]++;
            });
            summaryBody.innerHTML += `<tr><td>${name}</td><td>${counts.D2}</td><td style="font-weight:bold; color:purple">${counts.D7}</td><td>${counts.C}</td><td>${counts.C1}</td><td>${counts.C2}</td><td>${counts.O}</td><td><b>${counts.C+counts.C1+counts.C2}</b></td></tr>`;
        });
    }

    function generateSchedule() {
        const y = parseInt(document.getElementById('year').value);
        const m = parseInt(document.getElementById('month').value);
        const days = new Date(y, m, 0).getDate();
        const schedule = {};
        const stats = {};

        staffList.forEach(s => {
            // 基礎統計與平日假權重
            let weekdayO = 0;
            for(let d=1; d<=days; d++) {
                const val = document.querySelector(`input[data-staff="${s}"][data-day="${d}"]`).value.toUpperCase();
                if(val === 'O' && !isHoliday(y, m, d)) weekdayO++;
            }
            stats[s] = { totalCall: 0, d7: 0, lastCall: -10, weight: weekdayO * 0.7 };
        });

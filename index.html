<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>進階香港編更系統 (2025-2026)</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; margin: 20px; background: #f0f2f5; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #4CAF50; padding-bottom: 10px; }
        .controls { margin-bottom: 20px; padding: 15px; background: #eef2f3; border-radius: 8px; }
        input, button { padding: 8px; margin: 5px; border-radius: 4px; border: 1px solid #ccc; }
        button { background: #4CAF50; color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background: #45a049; }
        .table-wrapper { overflow-x: auto; margin-top: 20px; }
        table { border-collapse: collapse; width: 100%; min-width: 800px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; white-space: nowrap; }
        th { background: #4CAF50; color: white; }
        .holiday { background-color: #ffebee !important; color: #d32f2f; font-weight: bold; }
        .weekend { background-color: #f9f9f9; }
        .duty-C, .duty-C1, .duty-C2 { background-color: #fff3cd; font-weight: bold; color: #856404; border: 2px solid #ffeeba; }
        .duty-D7 { background-color: #d1ecf1; color: #0c5460; }
        .stats { margin-top: 25px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .stat-card { background: #fff; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h2>HK 智能編更系統 (符合 3-7 日 Call Duty 間隔)</h2>
    
    <div class="controls">
        選擇月份：<input type="month" id="monthInput" value="2025-05">
        <br>
        員工 (以逗號分隔)：<br>
        <input type="text" id="staffInput" value="員工1, 員工2, 員工3, 員工4, 員工5, 員工6, 員工7, 員工8, 員工9, 員工10" style="width: 90%;">
        <br>
        <button onclick="generateSchedule()">產生符合規則的更表</button>
    </div>

    <div class="table-wrapper" id="tableContainer"></div>
    <div id="statsContainer" class="stats"></div>
</div>

<script>
// 簡易 2025-2026 香港公眾假期清單 (可根據官網更新)
const HK_HOLIDAYS = [
    "2025-01-01", "2025-01-29", "2025-01-30", "2025-01-31", "2025-04-04", "2025-04-18", "2025-04-19", "2025-04-21", "2025-05-01", "2025-05-05", "2025-05-31", "2025-07-01", "2025-10-01", "2025-10-07", "2025-10-29", "2025-12-25", "2025-12-26",
    "2026-01-01", "2026-02-17", "2026-02-18", "2026-02-19", "2026-04-03", "2026-04-04", "2026-04-06", "2026-05-01", "2026-05-22", "2026-06-19", "2026-07-01", "2026-10-01", "2026-10-16", "2026-12-25", "2026-12-26"
];

function isHoliday(dateStr) {
    return HK_HOLIDAYS.includes(dateStr);
}

function generateSchedule() {
    const [year, month] = document.getElementById('monthInput').value.split('-').map(Number);
    const staff = document.getElementById('staffInput').value.split(',').map(s => s.trim());
    const daysInMonth = new Date(year, month, 0).getDate();
    
    let schedule = {}; 
    let stats = {};
    let lastCallDay = {}; // 記錄上一次 Call Duty (C, C1, C2) 的日期

    staff.forEach(s => {
        schedule[s] = {};
        stats[s] = { C1C2: 0, D7: 0, C: 0 };
        lastCallDay[s] = -10; // 預設一個很遠的日期
    });

    for (let d = 1; d <= daysInMonth; d++) {
        let dateObj = new Date(year, month - 1, d);
        let dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        let dayOfWeek = dateObj.getDay(); 
        let isSpecialDay = (dayOfWeek === 0 || dayOfWeek === 6 || isHoliday(dateStr));

        // 過濾出符合「相隔 3-7 日」規則的員工 (冷卻期)
        let getAvailableForCall = () => staff.filter(s => {
            let gap = d - lastCallDay[s];
            return gap >= 4; // 至少隔3日，即第4日才能再排
        });

        let candidates = getAvailableForCall().sort(() => Math.random() - 0.5);

        if (isSpecialDay) {
            // 假日/周末：需要 C1, C2
            let assignedCount = 0;
            candidates.sort((a, b) => stats[a].C1C2 - stats[b].C1C2); // 優先排 C1C2 少的人

            for (let s of candidates) {
                if (stats[s].C1C2 < 2 && assignedCount < 2) {
                    let type = (assignedCount === 0) ? 'C1' : 'C2';
                    schedule[s][d] = type;
                    stats[s].C1C2++;
                    lastCallDay[s] = d;
                    assignedCount++;
                }
            }
            // 其餘人放假
            staff.forEach(s => { if (!schedule[s][d]) schedule[s][d] = 'OFF'; });
        } else {
            // 平日：1個C, 4個D7, 餘下D2
            // 1. 排 Call
            if (candidates.length > 0) {
                let caller = candidates[0];
                schedule[caller][d] = 'C';
                stats[caller].C++;
                lastCallDay[caller] = d;
            }

            // 2. 排 D7 (選剩餘中 D7 最少的人)
            let remaining = staff.filter(s => !schedule[s][d])
                                .sort((a, b) => stats[a].D7 - stats[b].D7);
            
            for (let i = 0; i < 4; i++) {
                if (remaining[i]) {
                    schedule[remaining[i]][d] = 'D7';
                    stats[remaining[i]].D7++;
                }
            }
            // 3. 其餘 D2
            staff.forEach(s => { if (!schedule[s][d]) schedule[s][d] = 'D2'; });
        }
    }
    renderTable(year, month, daysInMonth, staff, schedule, stats);
}

function renderTable(year, month, daysInMonth, staff, schedule, stats) {
    let html = `<table><tr><th>員工 \\ 日期</th>`;
    for (let d = 1; d <= daysInMonth; d++) {
        let dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        let day = new Date(year, month-1, d).getDay();
        let dayName = ['日','一','二','三','四','五','六'][day];
        let holidayClass = isHoliday(dateStr) || day === 0 || day === 6 ? 'holiday' : '';
        html += `<th class="${holidayClass}">${d}<br>(${dayName})</th>`;
    }
    html += `</tr>`;

    staff.forEach(s => {
        html += `<tr><td><strong>${s}</strong></td>`;
        for (let d = 1; d <= daysInMonth; d++) {
            let duty = schedule[s][d] || '-';
            html += `<td class="duty-${duty}">${duty}</td>`;
        }
        html += `</tr>`;
    });
    html += `</table>`;
    document.getElementById('tableContainer').innerHTML = html;

    let statsHtml = "";
    staff.forEach(s => {
        statsHtml += `<div class="stat-card"><strong>${s}</strong><br>D7 總數: ${stats[s].D7}<br>C1/C2 總數: ${stats[s].C1C2}<br>平日 Call: ${stats[s].C}</div>`;
    });
    document.getElementById('statsContainer').innerHTML = statsHtml;
}
</script>
</body>
</html>

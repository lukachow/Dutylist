<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員工排更系統 (員工1-10)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --d2-bg: #e3f2fd; --d2-text: #0d47a1;
            --d7-bg: #f3e5f5; --d7-text: #4a148c;
            --call-bg: #fff3e0; --call-text: #e65100;
            --holiday-bg: #ffebee;
        }

        body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background: #f4f7f6; margin: 20px; color: var(--primary); }
        .container { max-width: 1400px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        h2 { text-align: center; margin-bottom: 25px; color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px; }

        .controls { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; background: #f9f9f9; padding: 20px; border-radius: 8px; align-items: center; }
        
        input[type="number"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 80px; }
        
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; font-weight: bold; font-size: 14px; }
        .btn-init { background: var(--primary); color: white; }
        .btn-generate { background: #27ae60; color: white; }
        .btn-reset { background: #e74c3c; color: white; }
        .btn-export { background: #f39c12; color: white; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }

        .table-wrapper { overflow-x: auto; margin-top: 20px; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th, td { border: 1px solid #eee; padding: 10px 5px; text-align: center; }
        th { background: #f8f9fa; position: sticky; top: 0; font-size: 12px; }
        
        .staff-name { font-weight: bold; background: #f0f4f8; width: 100px; }

        /* Duty Styling */
        .cell-input { width: 45px; height: 30px; border: 1px solid #ddd; border-radius: 4px; text-align: center; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .cell-input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 5px rgba(52,152,219,0.3); }

        .duty-D2 { background-color: var(--d2-bg) !important; color: var(--d2-text); }
        .duty-D7 { background-color: var(--d7-bg) !important; color: var(--d7-text); }
        .duty-C, .duty-C1, .duty-C2 { background-color: var(--call-bg) !important; color: var(--call-text); }
        .is-holiday { color: #e74c3c; background-color: #fff5f5; }
        .off-day { background-color: #f0f0f0; color: #999; }

        .legend { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin: 20px 0; padding: 15px; border: 1px dashed #ccc; border-radius: 8px; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .color-box { width: 20px; height: 20px; border-radius: 4px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container">
    <h2>📅 員工自動排更系統 (10人版)</h2>

    <div class="controls">
        <div>
            年份：<input type="number" id="year" value="2024">
            月份：<input type="number" id="month" value="10" min="1" max="12">
            <button class="btn-init" onclick="initTable()">設定月份</button>
        </div>
        <button class="btn-generate" onclick="generateSchedule()">⚡ 自動生成更表</button>
        <button class="btn-reset" onclick="clearNoCall()">一鍵清除所有 NO CALL</button>
        <button class="btn-export" onclick="exportToExcel()">📥 匯出 Excel</button>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="color-box" style="background:var(--d2-bg)"></div> D2: 08:30-17:18</div>
        <div class="legend-item"><div class="color-box" style="background:var(--d7-bg)"></div> D7: 09:30-18:18</div>
        <div class="legend-item"><div class="color-box" style="background:var(--call-bg)"></div> C/C1/C2: Call Duty</div>
        <div class="legend-item">輸入 <b>"OFF"</b> = 放假 | <b>"NC"</b> = 不排 Call</div>
    </div>

    <div class="table-wrapper">
        <table id="scheduleTable">
            <thead><tr id="headerRow"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const staffList = ["員工1", "員工2", "員工3", "員工4", "員工5", "員工6", "員工7", "員工8", "員工9", "員工10"];
    
    // 2024-2025 香港公眾假期範例
    const holidays = ["2024-01-01", "2024-02-10", "2024-02-11", "2024-02-12", "2024-02-13", "2024-03-29", "2024-03-30", "2024-04-01", "2024-04-04", "2024-05-01", "2024-05-15", "2024-06-10", "2024-07-01", "2024-09-19", "2024-10-01", "2024-10-11", "2024-12-25", "2024-12-26", "2025-01-01", "2025-01-29", "2025-01-30", "2025-01-31"];

    function isHoliday(dateStr) {
        const d = new Date(dateStr);
        return d.getDay() === 0 || d.getDay() === 6 || holidays.includes(dateStr);
    }

    function initTable() {
        const year = document.getElementById('year').value;
        const month = document.getElementById('month').value;
        const daysInMonth = new Date(year, month, 0).getDate();
        const headerRow = document.getElementById('headerRow');
        const tableBody = document.getElementById('tableBody');
        
        headerRow.innerHTML = '<th class="staff-name">員工 \ 日期</th>';
        for(let i=1; i<=daysInMonth; i++) {
            const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const dayName = ["日","一","二","三","四","五","六"][new Date(dateStr).getDay()];
            const holidayClass = isHoliday(dateStr) ? 'class="is-holiday"' : '';
            headerRow.innerHTML += `<th ${holidayClass}>${i}<br>(${dayName})</th>`;
        }

        tableBody.innerHTML = '';
        staffList.forEach(staff => {
            let row = `<tr><td class="staff-name">${staff}</td>`;
            for(let i=1; i<=daysInMonth; i++) {
                row += `<td><input type="text" class="cell-input" data-staff="${staff}" data-day="${i}"></td>`;
            }
            row += '</tr>';
            tableBody.appendChild(row);
        });
    }

    function clearNoCall() {
        document.querySelectorAll('.cell-input').forEach(input => {
            if(input.value.toUpperCase() === 'NC') {
                input.value = '';
                input.className = 'cell-input';
            }
        });
    }

    function generateSchedule() {
        const year = document.getElementById('year').value;
        const month = document.getElementById('month').value;
        const daysInMonth = new Date(year, month, 0).getDate();
        const schedule = {};
        const stats = {};

        staffList.forEach(s => {
            stats[s] = { callTotal: 0, d7Total: 0, tueThuC: 0, lastCallDay: -10, weekendCallCount: 0, isOff: false };
        });

        // Step 1: 預填與統計
        for(let d=1; d<=daysInMonth; d++) {
            schedule[d] = {};
            staffList.forEach(s => {
                const input = document.querySelector(`input[data-staff="${s}"][data-day="${d}"]`);
                let val = input.value.toUpperCase();
                if(val === 'OFF') { schedule[d][s] = 'OFF'; stats[s].isOff = true; }
                else if(val === 'NC') { schedule[d][s] = 'NC'; }
                else if(['C','C1','C2','D2','D7'].includes(val)) {
                    schedule[d][s] = val;
                    if(['C','C1','C2'].includes(val)) {
                        stats[s].callTotal++;
                        stats[s].lastCallDay = d;
                        const dateObj = new Date(year, month-1, d);
                        if(dateObj.getDay() === 2 || dateObj.getDay() === 4) stats[s].tueThuC++;
                        if(isHoliday(`${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`)) stats[s].weekendCallCount++;
                    }
                }
            });
        }

        // Step 2: 自動排程
        for(let d=1; d<=daysInMonth; d++) {
            const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dateObj = new Date(dateStr);
            const isWE = isHoliday(dateStr);
            const dayOfWeek = dateObj.getDay();

            // 挑選可用於排 Call 的人 (排除預設 OFF, NC 或已手動排 Call 的)
            let callCandidates = staffList.filter(s => !schedule[d][s]);
            callCandidates = callCandidates.filter(s => {
                const dayDiff = d - stats[s].lastCallDay;
                return dayDiff >= 3 && dayDiff <= 7; // 嚴格執行 3-7 日間隔
            }).sort((a,b) => stats[a].callTotal - stats[b].callTotal);

            if(isWE) {
                ['C1', 'C2'].forEach(dutyType => {
                    if (Object.values(schedule[d]).includes(dutyType)) return;
                    const candidate = callCandidates.find(s => stats[s].weekendCallCount < 2);
                    if(candidate) {
                        schedule[d][candidate] = dutyType;
                        stats[candidate].callTotal++;
                        stats[candidate].weekendCallCount++;
                        stats[candidate].lastCallDay = d;
                        callCandidates = callCandidates.filter(s => s !== candidate);
                    }
                });
            } else {
                if (!Object.values(schedule[d]).includes('C')) {
                    callCandidates.sort((a,b) => {
                        if(dayOfWeek === 2 || dayOfWeek === 4) return stats[a].tueThuC - stats[b].tueThuC;
                        return stats[a].callTotal - stats[b].callTotal;
                    });
                    const candidate = callCandidates[0];
                    if(candidate) {
                        schedule[d][candidate] = 'C';
                        stats[candidate].callTotal++;
                        stats[candidate].lastCallDay = d;
                        if(dayOfWeek === 2 || dayOfWeek === 4) stats[candidate].tueThuC++;
                        callCandidates = callCandidates.filter(s => s !== candidate);
                    }
                }
            }

            // Step 3: 分配 D7 (平日4個) 與 D2
            let remainingStaff = staffList.filter(s => !['OFF','C','C1','C2'].includes(schedule[d][s]));
            remainingStaff.sort((a,b) => stats[a].d7Total - stats[b].d7Total);

            const d7Target = isWE ? 0 : 4;
            let d7Count = staffList.filter(s => schedule[d][s] === 'D7').length;

            remainingStaff.forEach(s => {
                if(!schedule[d][s] || schedule[d][s] === 'NC') {
                    if(d7Count < d7Target) {
                        schedule[d][s] = 'D7';
                        stats[s].d7Total++;
                        d7Count++;
                    } else {
                        schedule[d][s] = 'D2';
                    }
                }
            });
        }

        // 渲染結果與套用顏色
        staffList.forEach(s => {
            for(let d=1; d<=daysInMonth; d++) {
                const input = document.querySelector(`input[data-staff="${s}"][data-day="${d}"]`);
                const val = schedule[d][s];
                input.value = val;
                input.className = 'cell-input ' + (val === 'OFF' ? 'off-day' : `duty-${val}`);
            }
        });
    }

    function exportToExcel() {
        const wb = XLSX.utils.table_to_book(document.getElementById("scheduleTable"));
        XLSX.writeFile(wb, `Staff_Schedule_${document.getElementById('month').value}月.xlsx`);
    }

    window.onload = initTable;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>醫護排更系統 - 平日請假扣減版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db;
            --d2-bg: #e3f2fd; --d2-text: #0d47a1;
            --d7-bg: #f3e5f5; --d7-text: #4a148c;
            --call-bg: #fff3e0; --call-text: #e65100;
            --holiday-bg: #ffebee; --off-bg: #f8f9fa;
        }
        body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background: #f0f2f5; margin: 15px; font-size: 14px; }
        .container { max-width: 98%; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .config-section { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ddd; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 15px; }
        input, button { padding: 8px; border: 1px solid #ddd; border-radius: 6px; }
        button { cursor: pointer; font-weight: bold; border: none; transition: 0.2s; }
        .btn-main { background: var(--accent); color: white; }
        .btn-gen { background: #27ae60; color: white; padding: 10px 20px; font-size: 1.1em; }
        .btn-export { background: #f39c12; color: white; }
        .tag { background: var(--primary); color: white; padding: 4px 10px; border-radius: 15px; display: inline-flex; align-items: center; gap: 5px; margin: 3px; font-size: 12px; }
        .tag span { cursor: pointer; color: #ff7675; }
        .table-wrapper { overflow-x: auto; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; text-align: center; table-layout: fixed; }
        th, td { border: 1px solid #eee; padding: 4px 1px; height: 35px; }
        th { background: #f1f3f5; font-size: 11px; position: sticky; top: 0; }
        .is-holiday { background-color: var(--holiday-bg) !important; color: #d32f2f; }
        .staff-name { width: 90px; font-weight: bold; background: #f8f9fa !important; }
        .cell-input { width: 92%; height: 26px; border: 1px solid transparent; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        .duty-D2 { background-color: var(--d2-bg) !important; color: var(--d2-text); }
        .duty-D7 { background-color: var(--d7-bg) !important; color: var(--d7-text); }
        .duty-C, .duty-C1, .duty-C2 { background-color: var(--call-bg) !important; color: var(--call-text); border: 1px solid orange !important; }
        .duty-O { background-color: #eee !important; color: #999; }
        .summary-table { width: 100%; max-width: 900px; margin-top: 10px; border: 1px solid #ddd; }
        .summary-table th { background: var(--primary); color: white; padding: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🗓️ 醫護排更系統 (平日假扣減版)</h2>

    <div class="config-section">
        <div class="toolbar">
            年份: <input type="number" id="year" value="2024" style="width:75px">
            月份: <input type="number" id="month" value="10" min="1" max="12" style="width:55px">
            <input type="text" id="newStaffName" placeholder="同事姓名" style="width:100px">
            <button class="btn-main" onclick="addStaff()">＋新增同事</button>
            <button style="background:#6c757d; color:white;" onclick="initTable()">1. 生成空白表</button>
        </div>
        <div id="staffTags"></div>
    </div>

    <div class="toolbar">
        <button class="btn-gen" onclick="generateSchedule()">2. 自動計算 (僅扣減平日假 Call 額)</button>
        <button class="btn-export" onclick="exportData()">📥 匯出 Excel</button>
    </div>

    <div class="table-wrapper">
        <table id="scheduleTable">
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <div class="summary-section">
        <h3>📊 本月統計</h3>
        <p style="font-size: 12px; color: #666;">* 系統已根據平日（一至五且非公眾假期）填寫的 O 數自動優化 Call 位分配。</p>
        <table class="summary-table">
            <thead>
                <tr>
                    <th>同事</th><th>D2</th><th>D7</th><th>C</th><th>C1</th><th>C2</th><th>O (總計)</th><th>總 Call</th>
                </tr>
            </thead>
            <tbody id="summaryBody"></tbody>
        </table>
    </div>
</div>

<script>
    let customHolidays = ["2024-01-01","2024-02-10","2024-02-12","2024-02-13","2024-03-29","2024-03-30","2024-04-01","2024-04-04","2024-05-01","2024-05-15","2024-06-10","2024-07-01","2024-09-18","2024-10-01","2024-10-11","2024-12-25","2024-12-26","2025-01-01","2025-01-29","2025-01-30","2025-01-31","2025-04-04","2025-04-18","2025-04-19","2025-04-21","2025-05-01","2025-05-05","2025-05-31","2025-07-01","2025-10-01","2025-10-07","2025-10-29","2025-12-25","2025-12-26","2026-01-01","2026-02-17","2026-02-18","2026-02-19"];
    let staffList = ["員工1", "員工2", "員工3", "員工4", "員工5", "員工6", "員工7", "員工8"];

    function isHoliday(y, m, d) {
        const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const day = new Date(y, m - 1, d).getDay();
        return day === 0 || day === 6 || customHolidays.includes(dateStr);
    }

    function addStaff() {
        const name = document.getElementById('newStaffName').value.trim();
        if(name && !staffList.includes(name)) { staffList.push(name); renderTags(); }
    }

    function removeStaff(name) { staffList = staffList.filter(s => s !== name); renderTags(); }
    function renderTags() { document.getElementById('staffTags').innerHTML = staffList.map(s => `<div class="tag">${s} <span onclick="removeStaff('${s}')">×</span></div>`).join(''); }

    function initTable() {
        const y = document.getElementById('year').value;
        const m = document.getElementById('month').value;
        const days = new Date(y, m, 0).getDate();
        let header = `<tr><th class="staff-name">同事</th>`;
        for(let d=1; d<=days; d++) {
            const hClass = isHoliday(y, m, d) ? 'is-holiday' : '';
            header += `<th class="${hClass}">${d}<br>${["日","一","二","三","四","五","六"][new Date(y, m-1, d).getDay()]}</th>`;
        }
        header += `</tr>`;
        document.getElementById('thead').innerHTML = header;
        let body = '';
        staffList.forEach(name => {
            body += `<tr><td class="staff-name">${name}</td>`;
            for(let d=1; d<=days; d++) body += `<td><input type="text" class="cell-input" data-staff="${name}" data-day="${d}" oninput="updateAll(this)"></td>`;
            body += `</tr>`;
        });
        document.getElementById('tbody').innerHTML = body;
        calculateSummary();
    }

    function updateAll(el) { applyStyle(el); calculateSummary(); }
    function applyStyle(el) {
        el.className = 'cell-input';
        const val = el.value.toUpperCase();
        if (['D2','D7','C','C1','C2','O','NC'].includes(val)) el.classList.add('duty-' + val);
    }

    function calculateSummary() {
        const summaryBody = document.getElementById('summaryBody');
        summaryBody.innerHTML = '';
        staffList.forEach(name => {
            const inputs = document.querySelectorAll(`input[data-staff="${name}"]`);
            let counts = { D2:0, D7:0, C:0, C1:0, C2:0, O:0 };
            inputs.forEach(input => {
                const val = input.value.toUpperCase();
                if (counts[val] !== undefined) counts[val]++;
            });
            summaryBody.innerHTML += `<tr><td>${name}</td><td>${counts.D2}</td><td>${counts.D7}</td><td>${counts.C}</td><td>${counts.C1}</td><td>${counts.C2}</td><td>${counts.O}</td><td><b>${counts.C + counts.C1 + counts.C2}</b></td></tr>`;
        });
    }

    function generateSchedule() {
        const y = parseInt(document.getElementById('year').value);
        const m = parseInt(document.getElementById('month').value);
        const days = new Date(y, m, 0).getDate();
        const schedule = {};
        const stats = {};
        
        staffList.forEach(s => {
            // 只計算「平日」的 O 數來決定權重
            let weekdayOffCount = 0;
            for(let d=1; d<=days; d++) {
                const input = document.querySelector(`input[data-staff="${s}"][data-day="${d}"]`);
                if(input.value.toUpperCase() === 'O' && !isHoliday(y, m, d)) {
                    weekdayOffCount++;
                }
            }
            // 每請一天平日假，權重+0.8 (讓他在排序中靠後，從而減少 Call)
            stats[s] = { totalCall: 0, d7: 0, lastCall: -10, weight: weekdayOffCount * 0.8 };
        });

        for(let d=1; d<=days; d++) {
            schedule[d] = {};
            staffList.forEach(s => {
                const val = document.querySelector(`[data-staff="${s}"][data-day="${d}"]`).value.toUpperCase();
                if(val) {
                    schedule[d][s] = val;
                    if(['C','C1','C2'].includes(val)) { stats[s].totalCall++; stats[s].lastCall = d; }
                }
            });
        }

        for(let d=1; d<=days; d++) {
            const isWE = isHoliday(y, m, d);
            let callsNeeded = isWE ? ['C1', 'C2'] : ['C'];
            
            callsNeeded.forEach(type => {
                if (Object.values(schedule[d]).includes(type)) return;
                let pool = staffList.filter(s => !schedule[d][s] && (d - stats[s].lastCall >= 3));
                if (pool.length === 0) pool = staffList.filter(s => !schedule[d][s]);
                
                // 核心：總 Call + 平日假權重。請平日假越多的人，虛擬總數越高，越難選中。
                pool.sort((a,b) => (stats[a].totalCall + stats[a].weight - (stats[b].totalCall + stats[b].weight)) || (Math.random()-0.5));
                
                if(pool.length > 0) {
                    const picked = pool[0];
                    schedule[d][picked] = type;
                    stats[picked].totalCall++; stats[picked].lastCall = d;
                }
            });

            if (isWE) {
                staffList.forEach(s => { if(!schedule[d][s]) schedule[d][s] = 'O'; });
            } else {
                let d7Count = staffList.filter(s => schedule[d][s] === 'D7').length;
                let d7Pool = staffList.filter(s => !schedule[d][s]);
                d7Pool.sort((a,b) => (stats[a].d7 - stats[b].d7) || (Math.random()-0.5));
                while(d7Count < 4 && d7Pool.length > 0) {
                    const s = d7Pool.shift(); schedule[d][s] = 'D7'; stats[s].d7++; d7Count++;
                }
                staffList.forEach(s => { if(!schedule[d][s]) schedule[d][s] = 'D2'; });
            }
        }

        staffList.forEach(s => {
            for(let d=1; d<=days; d++) {
                const input = document.querySelector(`[data-staff="${s}"][data-day="${d}"]`);
                input.value = schedule[d][s];
                applyStyle(input);
            }
        });
        calculateSummary();
    }

    function exportData() {
        const table = document.getElementById("scheduleTable");
        const clonedTable = table.cloneNode(true);
        clonedTable.querySelectorAll('input').forEach(input => {
            const text = document.createTextNode(input.value);
            input.parentNode.replaceChild(text, input);
        });
        const wb = XLSX.utils.table_to_book(clonedTable);
        XLSX.writeFile(wb, `更表_${document.getElementById('year').value}_${document.getElementById('month').value}.xlsx`);
    }
    renderTags();
</script>
</body>
</html>

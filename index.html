<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>智能編更系統 Pro 3.0 - 全功能預設版</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
            --d2: #e0f2fe;
            --d7: #f0fdf4;
            --call: #fef3c7;
            --leave: #f1f5f9;
            --no-call-bg: #fee2e2;
        }
        body { font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--text); margin: 20px; }
        .container { max-width: 1600px; margin: auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        header { border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; margin-bottom: 20px; }
        h1 { color: var(--primary); margin: 0; font-size: 1.6rem; }

        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; background: #f1f5f9; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-end; }
        button { padding: 10px 15px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 13px; }
        
        .btn-init { background: #64748b; color: white; }
        .btn-gen { background: var(--primary); color: white; }
        .btn-csv { background: #10b981; color: white; }
        .btn-reset { background: #ef4444; color: white; }
        
        .table-wrapper { overflow-x: auto; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        table { border-collapse: collapse; width: 100%; min-width: 1200px; }
        th, td { border: 1px solid #e2e8f0; padding: 10px 2px; text-align: center; cursor: pointer; user-select: none; transition: 0.1s; }
        th { background: #f8fafc; font-size: 12px; }
        
        /* 樣式定義 */
        .duty-D2 { background-color: var(--d2); color: #0369a1; }
        .duty-D7 { background-color: var(--d7); color: #15803d; }
        .duty-C, .duty-C1, .duty-C2 { background-color: var(--call); color: #92400e; font-weight: bold; border: 2px solid #fcd34d !important; }
        .duty-OFF, .state-LEAVE { background-color: var(--leave); color: #94a3b8; font-style: italic; }
        .state-NOCALL { background-color: var(--no-call-bg); color: #dc2626; font-size: 10px; font-weight: bold; }
        .state-PRECALL { background-color: #fef3c7; border: 2px dashed #f59e0b !important; color: #b45309; }
        
        .holiday { color: #ef4444; background-color: #fef2f2 !important; }
        .legend { display: flex; gap: 15px; margin-bottom: 15px; font-size: 12px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .box { width: 16px; height: 16px; border-radius: 3px; border: 1px solid #ddd; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
        .stat-card { background: #fff; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>🗓️ 智能編更系統 Pro 3.0</h1></header>

    <div class="legend">
        <div class="legend-item"><div class="box" style="background:white;"></div> 點擊格子切換狀態：</div>
        <div class="legend-item"><div class="box" style="background:var(--no-call-bg);"></div> 🚫 NOCALL</div>
        <div class="legend-item"><div class="box" style="background:var(--leave);"></div> 🏖️ LEAVE (不計入平均)</div>
        <div class="legend-item"><div class="box" style="background:var(--call); border: 2px dashed #f59e0b;"></div> 📞 預設 CALL</div>
    </div>
    
    <div class="controls">
        <div style="display:flex; flex-direction:column; gap:5px;">
            <label style="font-size:12px;">月份</label>
            <input type="month" id="monthInput" value="2026-05" style="padding:8px;">
        </div>
        <div style="display:flex; flex-direction:column; gap:5px; flex:2;">
            <label style="font-size:12px;">員工名單</label>
            <input type="text" id="staffInput" value="員工A, 員工B, 員工C, 員工D, 員工E, 員工F, 員工G, 員工H, 員工I, 員工J" style="padding:8px;">
        </div>
        <div class="btn-group">
            <button class="btn-init" onclick="initTable()">1. 初始化</button>
            <button class="btn-gen" onclick="generateSchedule()">2. 自動生成</button>
            <button class="btn-reset" onclick="resetStates()">重設所有標記</button>
            <button class="btn-csv" onclick="exportToCSV()">匯出 CSV</button>
        </div>
    </div>

    <div class="table-wrapper" id="tableContainer"></div>
    <div id="statsContainer" class="stats-grid"></div>
</div>

<script>
const HK_HOLIDAYS = ["2026-01-01", "2026-02-17", "2026-02-18", "2026-02-19", "2026-04-03", "2026-04-04", "2026-04-06", "2026-05-01", "2026-05-22", "2026-06-19", "2026-07-01", "2026-10-01", "2026-10-16", "2026-12-25", "2026-12-26"];

let staffList = [], daysInMonth = 0, currentYear, currentMonth;
let cellStates = {}; // 存儲預設狀態: null, 'NOCALL', 'LEAVE', 'PRECALL'
let finalSchedule = {};

function isHoliday(dateStr) { return HK_HOLIDAYS.includes(dateStr); }

function initTable() {
    const monthVal = document.getElementById('monthInput').value;
    if(!monthVal) return;
    [currentYear, currentMonth] = monthVal.split('-').map(Number);
    staffList = document.getElementById('staffInput').value.split(',').map(s => s.trim()).filter(s => s !== "");
    daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
    
    cellStates = {}; finalSchedule = {};
    staffList.forEach(s => {
        cellStates[s] = {}; finalSchedule[s] = {};
        for(let d=1; d<=daysInMonth; d++) { cellStates[s][d] = null; finalSchedule[s][d] = ""; }
    });
    renderUI();
}

function resetStates() { if(confirm("確定要清除所有手動標記（假期、預設 Call）嗎？")) initTable(); }

function cycleState(s, d) {
    const states = [null, 'NOCALL', 'LEAVE', 'PRECALL'];
    let currentIdx = states.indexOf(cellStates[s][d]);
    cellStates[s][d] = states[(currentIdx + 1) % states.length];
    finalSchedule[s][d] = ""; // 切換狀態時清除已生成的更
    renderUI();
}

function renderUI(stats = null) {
    if(!staffList.length) return;
    let html = `<table><tr><th style="width:80px;">員工</th>`;
    for (let d = 1; d <= daysInMonth; d++) {
        let dateObj = new Date(currentYear, currentMonth-1, d);
        let dayName = ['日','一','二','三','四','五','六'][dateObj.getDay()];
        let isH = isHoliday(`${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`) || dateObj.getDay() === 0 || dateObj.getDay() === 6;
        html += `<th class="${isH?'holiday':''}">${d}<br>${dayName}</th>`;
    }
    html += `</tr>`;

    staffList.forEach(s => {
        html += `<tr><td><strong>${s}</strong></td>`;
        for (let d = 1; d <= daysInMonth; d++) {
            let state = cellStates[s][d];
            let duty = finalSchedule[s][d];
            let cellClass = duty ? `duty-${duty}` : (state ? `state-${state}` : "");
            let display = duty || (state === 'NOCALL' ? "🚫" : state === 'LEAVE' ? "🏖️" : state === 'PRECALL' ? "📞" : "");
            html += `<td class="${cellClass}" onclick="cycleState('${s}', ${d})">${display}</td>`;
        }
        html += `</tr>`;
    });
    html += `</table>`;
    document.getElementById('tableContainer').innerHTML = html;

    if (stats) {
        let statsHtml = "";
        staffList.forEach(s => {
            statsHtml += `<div class="stat-card"><strong>👤 ${s}</strong>Call: ${stats[s].totalCall} | 二四: ${stats[s].TueThuCall}<br>D7: ${stats[s].D7} | (不計假期)</div>`;
        });
        document.getElementById('statsContainer').innerHTML = statsHtml;
    }
}

function generateSchedule() {
    let stats = {}; let lastCallDay = {};
    staffList.forEach(s => {
        stats[s] = { totalCall: 0, TueThuCall: 0, C1C2: 0, D7: 0 }; lastCallDay[s] = -10;
    });

    for (let d = 1; d <= daysInMonth; d++) {
        let dateObj = new Date(currentYear, currentMonth - 1, d);
        let dateStr = `${currentYear}-${String(currentMonth).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        let dayOfWeek = dateObj.getDay(); 
        let isSpecial = (dayOfWeek === 0 || dayOfWeek === 6 || isHoliday(dateStr));
        let isTueThu = (dayOfWeek === 2 || dayOfWeek === 4);

        // 先處理 PRECALL (預設 Call)
        staffList.forEach(s => {
            if (cellStates[s][d] === 'PRECALL') {
                let type = isSpecial ? (stats[s].C1C2 === 0 ? 'C1' : 'C2') : 'C';
                finalSchedule[s][d] = type;
                stats[s].totalCall++; lastCallDay[s] = d;
                if(isSpecial) stats[s].C1C2++; else if(isTueThu) stats[s].TueThuCall++;
            } else if (cellStates[s][d] === 'LEAVE') {
                finalSchedule[s][d] = "OFF";
            }
        });

        const getCallPriority = (s) => {
            if (finalSchedule[s][d] || cellStates[s][d] === 'NOCALL') return -2000;
            let gap = d - lastCallDay[s];
            return (gap < 4) ? -1000 : (gap > 7 ? gap * 50 : gap * 5);
        };

        // 分配 Call
        if (isSpecial) {
            let needed = 2 - staffList.filter(s => finalSchedule[s][d].startsWith('C')).length;
            let avail = staffList.filter(s => getCallPriority(s) > 0 && stats[s].C1C2 < 2)
                        .sort((a, b) => getPriorityScore(b, d, stats, lastCallDay) - getPriorityScore(a, d, stats, lastCallDay));
            for (let i = 0; i < needed && i < avail.length; i++) {
                let s = avail[i];
                finalSchedule[s][d] = (stats[s].C1C2 === 0) ? 'C1' : 'C2';
                stats[s].C1C2++; stats[s].totalCall++; lastCallDay[s] = d;
            }
        } else {
            if (!staffList.some(s => finalSchedule[s][d] === 'C')) {
                let avail = staffList.filter(s => getCallPriority(s) > 0)
                            .sort((a, b) => getPriorityScore(b, d, stats, lastCallDay, isTueThu) - getPriorityScore(a, d, stats, lastCallDay, isTueThu));
                if (avail.length > 0) {
                    let s = avail[0]; finalSchedule[s][d] = 'C';
                    stats[s].totalCall++; if(isTueThu) stats[s].TueThuCall++; lastCallDay[s] = d;
                }
            }
        }

        // 分配 D7 和 D2
        if (!isSpecial) {
            let d7needed = 4 - staffList.filter(s => finalSchedule[s][d] === 'D7').length;
            let availD = staffList.filter(s => !finalSchedule[s][d] && cellStates[s][d] !== 'LEAVE')
                                .sort((a, b) => stats[a].D7 - stats[b].D7 || Math.random() - 0.5);
            for (let i = 0; i < d7needed && i < availD.length; i++) {
                finalSchedule[availD[i]][d] = 'D7'; stats[availD[i]].D7++;
            }
            staffList.forEach(s => { 
                if (!finalSchedule[s][d] && cellStates[s][d] !== 'LEAVE') finalSchedule[s][d] = "D2"; 
            });
        }
    }
    renderUI(stats);
}

function getPriorityScore(s, d, stats, lastCallDay, isTueThu = false) {
    let gap = d - lastCallDay[s];
    let score = (gap > 7) ? gap * 50 : gap * 5;
    if (isTueThu) score += (5 - stats[s].TueThuCall) * 20;
    score -= stats[s].totalCall * 10;
    return score;
}

function exportToCSV() {
    let csvContent = "\ufeff員工/日期,";
    for (let d = 1; d <= daysInMonth; d++) csvContent += `${currentMonth}/${d},`;
    csvContent += "\n";
    staffList.forEach(s => {
        csvContent += `${s},`;
        for(let d=1; d<=daysInMonth; d++) csvContent += `${finalSchedule[s][d] || ""},`;
        csvContent += "\n";
    });
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `Duty_Roster_Pro_${currentYear}_${currentMonth}.csv`;
    link.click();
}
</script>
</body>
</html>

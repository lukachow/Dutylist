<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>醫護排更系統 (永久假期更新版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db;
            --d2-bg: #e3f2fd; --d2-text: #0d47a1;
            --d7-bg: #f3e5f5; --d7-text: #4a148c;
            --call-bg: #fff3e0; --call-text: #e65100;
            --holiday-bg: #ffebee; --o-bg: #eeeeee;
        }
        body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background: #f0f2f5; margin: 15px; }
        .container { max-width: 98%; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .setup-section { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ddd; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 15px; }
        input, button, textarea { padding: 8px; border: 1px solid #ddd; border-radius: 6px; }
        button { cursor: pointer; font-weight: bold; border: none; transition: 0.2s; }
        .btn-gen { background: #27ae60; color: white; padding: 10px 20px; }
        .btn-export { background: #f39c12; color: white; }
        .tag { background: var(--primary); color: white; padding: 4px 10px; border-radius: 15px; display: inline-flex; align-items: center; gap: 5px; margin: 3px; }
        table { width: 100%; border-collapse: collapse; background: white; text-align: center; }
        th, td { border: 1px solid #eee; padding: 4px; height: 35px; }
        .is-holiday { background-color: var(--holiday-bg) !important; color: #d32f2f; }
        .cell-input { width: 90%; height: 26px; border: 1px solid transparent; text-align: center; font-weight: bold; text-transform: uppercase; }
        /* Styles for duties */
        .duty-D2 { background-color: var(--d2-bg) !important; color: var(--d2-text); }
        .duty-D7 { background-color: var(--d7-bg) !important; color: var(--d7-text); }
        .duty-C, .duty-C1, .duty-C2 { background-color: var(--call-bg) !important; color: var(--call-text); border: 1px solid orange !important; }
        .duty-O { background-color: var(--o-bg) !important; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏥 醫護排更系統 (2026+ 永久版)</h2>

    <div class="setup-section">
        <div class="toolbar">
            年份: <input type="number" id="year" value="2024" style="width:80px">
            月份: <input type="number" id="month" value="10" min="1" max="12" style="width:60px">
            <input type="text" id="newStaffName" placeholder="同事姓名" style="width:120px">
            <button style="background:var(--accent); color:white" onclick="addStaff()">＋新增同事</button>
            <button style="background:#6c757d; color:white;" onclick="initTable()">1. 生成空白表</button>
        </div>
        <div id="staffTags"></div>
        <hr>
        <div class="toolbar">
            <b>假期更新庫：</b>
            <textarea id="holidayInput" placeholder="在此貼入未來年份的假期日期 (如 2027-01-01)，每行一個" style="width:100%; height:50px; font-size:12px;"></textarea>
            <button style="background:#e17055; color:white;" onclick="syncHolidays()">同步假期數據</button>
        </div>
    </div>

    <div class="toolbar">
        <button class="btn-gen" onclick="generateSchedule()">2. 自動計算 (按平日假比例減 Call)</button>
        <button class="btn-export" onclick="exportData()">📥 匯出 Excel (已更正代碼顯示)</button>
    </div>

    <div style="overflow-x: auto;">
        <table id="scheduleTable">
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <div style="margin-top: 20px;">
        <h3>📊 本月統計</h3>
        <table style="width: auto; min-width: 600px; border: 1px solid #ddd;">
            <thead style="background:#2c3e50; color:white;">
                <tr><th>同事</th><th>D2</th><th>D7</th><th>C</th><th>C1</th><th>C2</th><th>O (總)</th><th>總 Call</th></tr>
            </thead>
            <tbody id="summaryBody"></tbody>
        </table>
    </div>
</div>

<script>
    // 預載假期數據 (涵蓋 2024, 2025, 以及 2026 預測)
    let holidays = [
        "2024-01-01","2024-02-10","2024-02-12","2024-02-13","2024-03-29","2024-03-30","2024-04-01","2024-04-04","2024-05-01","2024-05-15","2024-06-10","2024-07-01","2024-09-18","2024-10-01","2024-10-11","2024-12-25","2024-12-26",
        "2025-01-01","2025-01-29","2025-01-30","2025-01-31","2025-04-04","2025-04-18","2025-04-19","2025-04-21","2025-05-01","2025-05-05","2025-05-31","2025-07-01","2025-10-01","2025-10-07","2025-10-29","2025-12-25","2025-12-26",
        "2026-01-01","2026-02-17","2026-02-18","2026-02-19","2026-04-03","2026-04-04","2026-04-05","2026-04-06","2026-05-01","2026-05-24","2026-06-19","2026-07-01","2026-09-26","2026-10-01","2026-10-19","2026-12-25","2026-12-26"
    ];

    let staffList = ["同事A", "同事B", "同事C", "同事D", "同事E", "同事F", "同事G", "同事H"];

    function isHoliday(y, m, d) {
        const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const day = new Date(y, m - 1, d).getDay();
        return day === 0 || day === 6 || holidays.includes(dateStr);
    }

    function syncHolidays() {
        const input = document.getElementById('holidayInput').value;
        if(input) {
            const newDates = input.split(/[\n,]+/).map(d => d.trim()).filter(d => d);
            holidays = [...new Set([...holidays, ...newDates])];
            alert("假期已同步！共收錄 " + holidays.length + " 個假日。");
            initTable();
        }
    }

    function addStaff() {
        const name = document.getElementById('newStaffName').value.trim();
        if(name && !staffList.includes(name)) { staffList.push(name); renderTags(); }
    }

    function renderTags() {
        document.getElementById('staffTags').innerHTML = staffList.map(s => `<div class="tag">${s} <span onclick="staffList=staffList.filter(x=>x!=='${s}');renderTags();" style="cursor:pointer;color:red">×</span></div>`).join('');
    }

    function initTable() {
        const y = document.getElementById('year').value;
        const m = document.getElementById('month').value;
        const days = new Date(y, m, 0).getDate();
        let header = `<tr><th style="width:100px">同事</th>`;
        for(let d=1; d<=days; d++) {
            const hClass = isHoliday(y, m, d) ? 'is-holiday' : '';
            header += `<th class="${hClass}">${d}<br>${["日","一","二","三","四","五","六"][new Date(y, m-1, d).getDay()]}</th>`;
        }
        header += `</tr>`;
        document.getElementById('thead').innerHTML = header;

        let body = '';
        staffList.forEach(name => {
            body += `<tr><td style="font-weight:bold">${name}</td>`;
            for(let d=1; d<=days; d++) body += `<td><input type="text" class="cell-input" data-staff="${name}" data-day="${d}" oninput="applyStyle(this);calculateSummary();"></td>`;
            body += `</tr>`;
        });
        document.getElementById('tbody').innerHTML = body;
        calculateSummary();
    }

    function applyStyle(el) {
        el.className = 'cell-input';
        const val = el.value.toUpperCase();
        if (['D2','D7','C','C1','C2','O'].includes(val)) el.classList.add('duty-' + val);
    }

    function calculateSummary() {
        const summaryBody = document.getElementById('summaryBody');
        summaryBody.innerHTML = '';
        staffList.forEach(name => {
            const inputs = document.querySelectorAll(`input[data-staff="${name}"]`);
            let counts = { D2:0, D7:0, C:0, C1:0, C2:0, O:0 };
            inputs.forEach(input => {
                const val = input.value.toUpperCase();
                if (counts[val] !== undefined) counts[val]++;
            });
            summaryBody.innerHTML += `<tr><td>${name}</td><td>${counts.D2}</td><td>${counts.D7}</td><td>${counts.C}</td><td>${counts.C1}</td><td>${counts.C2}</td><td>${counts.O}</td><td><b>${counts.C+counts.C1+counts.C2}</b></td></tr>`;
        });
    }

    function generateSchedule() {
        const y = parseInt(document.getElementById('year').value);
        const m = parseInt(document.getElementById('month').value);
        const days = new Date(y, m, 0).getDate();
        const schedule = {};
        const stats = {};

        staffList.forEach(s => {
            let weekdayO = 0;
            for(let d=1; d<=days; d++) {
                const val = document.querySelector(`input[data-staff="${s}"][data-day="${d}"]`).value.toUpperCase();
                if(val === 'O' && !isHoliday(y, m, d)) weekdayO++;
            }
            stats[s] = { totalCall: 0, d7: 0, lastCall: -10, weight: weekdayO * 0.7 };
        });

        for(let d=1; d<=days; d++) {
            schedule[d] = {};
            const isH = isHoliday(y, m, d);
            let needed = isH ? ['C1', 'C2'] : ['C'];
            
            needed.forEach(type => {
                let pool = staffList.filter(s => {
                    const val = document.querySelector(`input[data-staff="${s}"][data-day="${d}"]`).value.toUpperCase();
                    return val !== 'O' && val !== 'NC' && (d - stats[s].lastCall >= 3);
                });
                if(pool.length === 0) pool = staffList.filter(s => document.querySelector(`input[data-staff="${s}"][data-day="${d}"]`).value.toUpperCase() !== 'O');
                
                pool.sort((a,b) => (stats[a].totalCall + stats[a].weight) - (stats[b].totalCall + stats[b].weight) || Math.random() - 0.5);
                
                if(pool.length > 0) {
                    const picked = pool[0];
                    schedule[d][picked] = type;
                    stats[picked].totalCall++;
                    stats[picked].lastCall = d;
                }
            });

            staffList.forEach(s => {
                if(schedule[d][s]) return;
                const manual = document.querySelector(`input[data-staff="${s}"][data-day="${d}"]`).value.toUpperCase();
                if(manual === 'O') { schedule[d][s] = 'O'; return; }
                
                if(isH) {
                    schedule[d][s] = 'O';
                } else {
                    // 平日 D7 / D2 邏輯
                    let d7Count = Object.values(schedule[d]).filter(v => v === 'D7').length;
                    if(d7Count < 4) {
                        schedule[d][s] = 'D7';
                    } else {
                        schedule[d][s] = 'D2';
                    }
                }
            });
        }

        staffList.forEach(s => {
            for(let d=1; d<=days; d++) {
                const input = document.querySelector(`input[data-staff="${s}"][data-day="${d}"]`);
                input.value = schedule[d][s];
                applyStyle(input);
            }
        });
        calculateSummary();
    }

    function exportData() {
        const table = document.getElementById("scheduleTable");
        const clonedTable = table.cloneNode(true);
        clonedTable.querySelectorAll('input').forEach(input => {
            const text = document.createTextNode(input.value);
            input.parentNode.replaceChild(text, input);
        });
        const wb = XLSX.utils.table_to_book(clonedTable);
        XLSX.writeFile(wb, `更表_${document.getElementById('year').value}年${document.getElementById('month').value}月.xlsx`);
    }

    renderTags();
</script>
</body>
</html>
